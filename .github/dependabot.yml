version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
      fortawesome:
        patterns:
          - '@fortawesome/*'
      commitlint:
        patterns:
          - '@commitlint/*'
      eslint:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'typescript-eslint'
    open-pull-requests-limit: 10
    assignees:
      - 'apauldev'
    labels:
      - 'dependencies'
