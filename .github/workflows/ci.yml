name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'screenshots/**'
      - '.github/**'
      - '!.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'screenshots/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Light checks grouped together to save setup time (pnpm install overhead)
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format Check
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  docker-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create docker-compose.ci.yml
        run: |
          cat <<EOF > docker-compose.ci.yml
          services:
            api:
              image: yotara-api:latest
              build: !reset
            frontend:
              image: yotara-frontend:latest
              build: !reset
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # We build with Buildx to leverage GHA caching
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: yotara-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          load: true
          tags: yotara-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # To use the pre-built images with docker-compose, we can use an override
      # or just rely on the fact that they are already tagged.
      # However, docker-compose.yml has 'build' sections.
      # If we run 'docker-compose up -d', it might try to rebuild.
      # We can create a temporary override to point to the images we just built.

      - name: Install pnpm (for smoke test scripts)
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Run Smoke Test
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          # Wait for services to be ready is handled inside the smoke script, 
          # but we give them a small head start.
          sleep 5
          pnpm smoke:docker
        env:
          DOCKER_SMOKE_BASE_URL: http://localhost:8080

      - name: Logs on failure
        if: failure()
        run: |
          if [ -f docker-compose.ci.yml ]; then
            docker compose -f docker-compose.yml -f docker-compose.ci.yml logs
          else
            docker compose -f docker-compose.yml logs
          fi
