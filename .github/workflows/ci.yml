name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'screenshots/**'
      - '.github/**'
      - '!.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'screenshots/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Light checks grouped together to save setup time (pnpm install overhead)
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format Check
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Audit
        continue-on-error: true
        run: pnpm audit --audit-level=moderate

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test

  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Collect coverage
        run: pnpm test:coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: .
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate version
        run: pnpm version:gen
      - name: Build shared package
        run: pnpm --filter @yotara/shared build
      - name: Start API
        run: |
          RATE_LIMIT_MAX=10000 pnpm --filter @yotara/api dev &
          pnpm --filter @yotara/frontend wait-on --timeout 60000 http-get://localhost:3000/health
      - name: Start Frontend
        run: |
          pnpm --filter @yotara/frontend dev &
          pnpm --filter @yotara/frontend wait-on --timeout 60000 http-get://localhost:4200
      - name: Install Playwright browsers
        run: pnpm --filter @yotara/frontend exec playwright install chromium
      - name: Run E2E tests
        run: pnpm --filter @yotara/frontend e2e
        env:
          CI: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/e2e/playwright-report/

  docker-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Create docker-compose.ci.yml
        run: |
          cat <<EOF > docker-compose.ci.yml
          services:
            api:
              image: yotara-api:latest
              build: !reset
            frontend:
              image: yotara-frontend:latest
              build: !reset
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # We build with Buildx to leverage GHA caching
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: yotara-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          load: true
          tags: yotara-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # To use the pre-built images with docker-compose, we can use an override
      # or just rely on the fact that they are already tagged.
      # However, docker-compose.yml has 'build' sections.
      # If we run 'docker-compose up -d', it might try to rebuild.
      # We can create a temporary override to point to the images we just built.

      - name: Install pnpm (for smoke test scripts)
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Run Smoke Test
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          # Wait for services to be ready is handled inside the smoke script, 
          # but we give them a small head start.
          sleep 5
          pnpm smoke:docker
        env:
          DOCKER_SMOKE_BASE_URL: http://localhost:8080

      - name: Logs on failure
        if: failure()
        run: |
          if [ -f docker-compose.ci.yml ]; then
            docker compose -f docker-compose.yml -f docker-compose.ci.yml logs
          else
            docker compose -f docker-compose.yml logs
          fi
