<div class="onboarding-screen">
  <header class="onboarding-header">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M20 4C11 4 4 10.3 4 18c0 .9.1 1.8.4 2.6A9.8 9.8 0 0 0 12 24c6.6 0 12-5.4 12-12V4h-4Z"
          />
        </svg>
      </div>
      <span class="brand-name">Yotara</span>
    </div>
    <button class="help-button" type="button" (click)="goToHelp()">Help</button>
  </header>

  <main class="onboarding-main">
    <div class="hero-icon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M20 4C11 4 4 10.3 4 18c0 .9.1 1.8.4 2.6A9.8 9.8 0 0 0 12 24c6.6 0 12-5.4 12-12V4h-4Z"
        />
        <path
          d="M7.5 16.8a1 1 0 1 0 1.5 1.4c1.6-1.7 4-3.4 7.4-4.5a1 1 0 1 0-.6-1.9c-3.8 1.3-6.6 3.2-8.3 5Z"
          class="hero-vein"
        />
      </svg>
    </div>

    <h1>Welcome to Yotara</h1>
    <p class="subtitle">Flow through your day, naturally</p>

    <div class="workspace-grid">
      @for (option of workspaceOptions; track option.id) {
        <button
          class="workspace-card"
          [class.selected]="selectedWorkspace() === option.id"
          type="button"
          (click)="selectWorkspace(option.id)"
        >
          <span class="card-check" aria-hidden="true">✓</span>
          <div class="card-icon" [class.sprout]="option.icon === 'sprout'">
            @if (option.icon === 'leaf') {
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M20 4C11 4 4 10.3 4 18c0 .9.1 1.8.4 2.6A9.8 9.8 0 0 0 12 24c6.6 0 12-5.4 12-12V4h-4Z"
                />
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 11.8c.2-2.5 1.4-4.8 3.5-6.6l1.3-1.1.4 1.7c.7 3.1-.6 6-3.3 7.7a9.6 9.6 0 0 0 4.4-.2 1 1 0 0 1 .5 1.9c-1.8.5-3.8.6-5.8.2v2.2h4a1 1 0 0 1 0 2H7a1 1 0 0 1 0-2h4v-2.3a8.3 8.3 0 0 1-5.7-.2 1 1 0 0 1 .5-1.9c1.4.4 2.8.5 4.2.2A8.4 8.4 0 0 1 6.5 6l.4-1.8 1.4 1.1c2 1.8 3.2 4.1 3.4 6.5Z"
                />
              </svg>
            }
          </div>
          <h2>{{ option.title }}</h2>
          <p>{{ option.description }}</p>
        </button>
      }
    </div>

    <button class="continue-button" type="button" (click)="continue()">Continue</button>

    <div class="progress-dots" aria-hidden="true">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </main>
</div>
